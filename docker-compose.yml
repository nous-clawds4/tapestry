services:
  tapestry:
    build: .
    ports:
      - "8080:80"
      - "7777:7777"
      - "7778:7778"
      - "7474:7474"
      - "7687:7687"
    environment:
      - OWNER_PUBKEY=15f7dafc4624b1e6b00ab7f863de1a53b71967528070ec7d1837c7a40c1c7270
      - NEO4J_PASSWORD=3wGDrv6c8svbHVxKiXPL
      - DOMAIN_NAME=localhost
    volumes:
      - tapestry-neo4j:/var/lib/neo4j/data
      - tapestry-strfry:/var/lib/strfry
      - tapestry-data:/var/lib/brainstorm
      - tapestry-logs:/var/log/brainstorm
    restart: unless-stopped

volumes:
  tapestry-neo4j:
  tapestry-strfry:
  tapestry-data:
  tapestry-logs:
