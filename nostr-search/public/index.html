<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nostr Search</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 24px; }
    .search-box {
      width: 100%;
      padding: 14px 18px;
      font-size: 1.1rem;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: #7c3aed; }
    .search-box::placeholder { color: #555; }
    .stats-bar {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 0.75rem;
      color: #555;
    }
    .results { margin-top: 24px; }
    .result {
      display: flex;
      gap: 14px;
      padding: 16px;
      border-radius: 10px;
      background: #141414;
      margin-bottom: 10px;
      border: 1px solid #1e1e1e;
      transition: border-color 0.15s;
    }
    .result:hover { border-color: #333; }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #222;
      flex-shrink: 0;
      object-fit: cover;
    }
    .info { flex: 1; min-width: 0; }
    .name { font-weight: 600; color: #fff; font-size: 0.95rem; }
    .nip05 { color: #7c3aed; font-size: 0.8rem; margin-top: 2px; }
    .npub {
      font-size: 0.7rem;
      color: #444;
      font-family: monospace;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .about {
      font-size: 0.82rem;
      color: #888;
      margin-top: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .lightning { font-size: 0.75rem; color: #f7931a; margin-top: 4px; }
    .empty {
      text-align: center;
      color: #444;
      padding: 60px 0;
      font-size: 0.9rem;
    }
    .query-time { color: #7c3aed; }
    mark { background: #7c3aed33; color: #c4b5fd; border-radius: 2px; padding: 0 1px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nostr Search</h1>
    <p class="subtitle">Search nostr profiles by name, nip05, about, lightning address, or anything in kind 0</p>
    <input class="search-box" type="text" placeholder="Search profiles..." autofocus id="search">
    <div class="stats-bar">
      <span id="stats">Loading index...</span>
      <span id="timing"></span>
    </div>
    <div class="results" id="results">
      <div class="empty">Type to search nostr profiles</div>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById('search');
    const resultsDiv = document.getElementById('results');
    const statsSpan = document.getElementById('stats');
    const timingSpan = document.getElementById('timing');
    let debounceTimer = null;

    // Load stats
    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const data = await res.json();
        statsSpan.textContent = `${data.numberOfDocuments.toLocaleString()} profiles indexed`;
      } catch {
        statsSpan.textContent = 'Index unavailable';
      }
    }
    loadStats();
    setInterval(loadStats, 10000);

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function truncateNpub(npub) {
      if (!npub) return '';
      return npub.slice(0, 12) + '...' + npub.slice(-6);
    }

    function renderResults(data) {
      if (!data.hits || data.hits.length === 0) {
        resultsDiv.innerHTML = '<div class="empty">No profiles found</div>';
        timingSpan.textContent = '';
        return;
      }

      timingSpan.innerHTML = `<span class="query-time">${data.processingTimeMs}ms</span> · ${data.estimatedTotalHits} results`;

      resultsDiv.innerHTML = data.hits.map(h => {
        const name = escapeHtml(h._formatted?.display_name || h._formatted?.name || h.display_name || h.name || 'Anonymous');
        const nip05 = escapeHtml(h._formatted?.nip05 || h.nip05);
        const about = escapeHtml(h._formatted?.about || h.about);
        const lud16 = escapeHtml(h.lud16);
        const npub = h.npub || '';
        const picture = h.picture || '';

        return `<div class="result">
          ${picture
            ? `<img class="avatar" src="${escapeHtml(picture)}" onerror="this.style.display='none'" loading="lazy">`
            : `<div class="avatar"></div>`}
          <div class="info">
            <div class="name">${name}</div>
            ${nip05 ? `<div class="nip05">${nip05}</div>` : ''}
            <div class="npub">${escapeHtml(truncateNpub(npub))}</div>
            ${about ? `<div class="about">${about}</div>` : ''}
            ${lud16 ? `<div class="lightning">⚡ ${lud16}</div>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    async function search(query) {
      if (!query.trim()) {
        resultsDiv.innerHTML = '<div class="empty">Type to search nostr profiles</div>';
        timingSpan.textContent = '';
        return;
      }

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(query)}&limit=20`);
        const data = await res.json();
        renderResults(data);
      } catch {
        resultsDiv.innerHTML = '<div class="empty">Search error</div>';
      }
    }

    searchInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => search(searchInput.value), 200);
    });
  </script>
</body>
</html>
