[program:neo4j]
command=/usr/share/neo4j/bin/neo4j console
user=neo4j
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/neo4j.log
stderr_logfile=/var/log/supervisor/neo4j-error.log
priority=10

[program:strfry]
command=/usr/local/bin/strfry relay
user=strfry
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/strfry.log
stderr_logfile=/var/log/supervisor/strfry-error.log
environment=STRFRY_CONFIG="/etc/strfry.conf"
priority=20

[program:brainstorm]
command=node /usr/local/lib/node_modules/brainstorm/index.js
user=root
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/brainstorm.log
stderr_logfile=/var/log/supervisor/brainstorm-error.log
environment=NODE_ENV="production"
priority=30
startsecs=10
startretries=5
